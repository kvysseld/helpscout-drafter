name: Draft Help Scout Replies

on:
  schedule:
    # Runs at 13:000 UTC every weekday (that's 9:00 AM Eastern)
    # Adjust the hour if you want it earlier/later
    - cron: '0 13 * * 1-5'
  workflow_dispatch:  # This adds a manual "Run" button in the GitHub UI

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the drafter
        run: python draft_responses.py
        env:
          HELPSCOUT_APP_ID: ${{ secrets.HELPSCOUT_APP_ID }}
          HELPSCOUT_APP_SECRET: ${{ secrets.HELPSCOUT_APP_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HELPSCOUT_DOCS_API_KEY: ${{ secrets.HELPSCOUT_DOCS_API_KEY }}
