name: Draft Help Scout Replies

on:
  schedule:
    # 8:50 AM Eastern (12:50 UTC during EDT)
    - cron: '50 12 * * 1-5'
    # 9:10 AM Eastern backup in case 8:50 is skipped
    - cron: '10 13 * * 1-5'
    # 12:50 PM Eastern (16:50 UTC during EDT)
    - cron: '50 16 * * 1-5'
  workflow_dispatch:  # Manual "Run" button in GitHub UI

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the drafter
        run: python draft_responses.py
        env:
          HELPSCOUT_APP_ID: ${{ secrets.HELPSCOUT_APP_ID }}
          HELPSCOUT_APP_SECRET: ${{ secrets.HELPSCOUT_APP_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HELPSCOUT_DOCS_API_KEY: ${{ secrets.HELPSCOUT_DOCS_API_KEY }}
          HELPSCOUT_DOCS_SITE_ID: ${{ secrets.HELPSCOUT_DOCS_SITE_ID }}
          HELPSCOUT_MAILBOX_ID: ${{ secrets.HELPSCOUT_MAILBOX_ID }}
