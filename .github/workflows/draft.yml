name: Draft Help Scout Replies

on:
  schedule:
    # Every 30 minutes from 7:00 AM to 4:00 PM EDT (11 UTC to 20 UTC)
    # Weekdays only. GitHub Actions cron uses UTC.
    - cron: '0 11 * * 1-5'    # 7:00 AM EDT
    - cron: '0 12 * * 1-5'    # 8:00 AM EDT
    - cron: '30 12 * * 1-5'   # 8:30 AM EDT
    - cron: '0 13 * * 1-5'    # 9:00 AM EDT
    - cron: '30 13 * * 1-5'   # 9:30 AM EDT
    - cron: '0 14 * * 1-5'    # 10:00 AM EDT
    - cron: '30 14 * * 1-5'   # 10:30 AM EDT
    - cron: '0 15 * * 1-5'    # 11:00 AM EDT
    - cron: '30 15 * * 1-5'   # 11:30 AM EDT
    - cron: '0 17 * * 1-5'    # 1:00 PM EDT
    - cron: '30 17 * * 1-5'   # 1:30 PM EDT
    - cron: '0 18 * * 1-5'    # 2:00 PM EDT
    - cron: '30 18 * * 1-5'   # 2:30 PM EDT
    - cron: '0 19 * * 1-5'    # 3:00 PM EDT
    - cron: '30 19 * * 1-5'   # 3:30 PM EDT
    - cron: '0 20 * * 1-5'    # 4:00 PM EDT
  workflow_dispatch:  # Manual "Run" button in GitHub UI

permissions:
  contents: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the drafter
        run: python draft_responses.py
        env:
          HELPSCOUT_APP_ID: ${{ secrets.HELPSCOUT_APP_ID }}
          HELPSCOUT_APP_SECRET: ${{ secrets.HELPSCOUT_APP_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          HELPSCOUT_DOCS_API_KEY: ${{ secrets.HELPSCOUT_DOCS_API_KEY }}
          HELPSCOUT_DOCS_SITE_ID: ${{ secrets.HELPSCOUT_DOCS_SITE_ID }}
          HELPSCOUT_MAILBOX_ID: ${{ secrets.HELPSCOUT_MAILBOX_ID }}

      - name: Keep repo active
        run: |
          date > .last-run
          git config user.name "Auto-Drafter"
          git config user.email "actions@github.com"
          git add .last-run
          git diff --cached --quiet || git commit -m "Auto-drafter ran $(date -u +%Y-%m-%d)" && git push || true
